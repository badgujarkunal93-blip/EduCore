<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>EduCore | Kinetic Observatory Login</title>

                        "primary-dim": "#00e2ee",
                        "surface-container": "#161a21",

                        "on-secondary-container": "#f8f1ff",
                        "on-tertiary": "#390050",
                        "error-dim": "#d7383b",
                        "on-tertiary-container": "#000000",
                        "inverse-primary": "#006a70",
                        "tertiary-container": "#be0dff",
                        "secondary-fixed-dim": "#ceb9ff",
                        "surface-tint": "#99f7ff",
                        "surface-container-highest": "#22262f",
                        "inverse-surface": "#f9f9ff",

<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24;
        }
        .glass-panel {
            background: rgba(17, 21, 28, 0.7);
            backdrop-filter: blur(24px);
            border: 1px solid rgba(153, 247, 255, 0.1);
        }
        .kinetic-grid {
            background-image: 
                linear-gradient(rgba(0, 242, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 242, 255, 0.03) 1px, transparent 1px);
            background-size: 40px 40px;
        }
        .glow-secondary {
            box-shadow: 0 0 20px rgba(172, 137, 255, 0.2);
        }
    </style>
</head>
<body class="bg-surface font-body text-on-surface selection:bg-primary selection:text-on-primary-container">
<!-- Background Layer -->
<div class="fixed inset-0 z-0 bg-[#0F1117]">
<div class="absolute inset-0 kinetic-grid"></div>
<div class="absolute top-1/4 left-1/4 w-[500px] h-[500px] bg-secondary/10 rounded-full blur-[120px]"></div>
<div class="absolute bottom-1/4 right-1/4 w-[400px] h-[400px] bg-primary/5 rounded-full blur-[100px]"></div>
</div>
<!-- Navigation (Suppressed per shell rules for transactional pages, but keeping Brand Identity) -->
<header class="fixed top-0 w-full z-50 flex flex-col items-center pt-12">
<div class="text-center">
<h1 class="font-headline font-black text-4xl tracking-tight text-cyan-400 drop-shadow-[0_0_12px_rgba(0,242,255,0.5)]">
                EduCore
            </h1>
<p class="font-label text-xs uppercase tracking-[0.4em] text-on-surface-variant mt-2">
                Kinetic Observatory
            </p>
</div>
</header>
<main class="relative z-10 min-h-screen flex items-center justify-center p-6 pt-32 pb-20">
<!-- Central Glass Card -->
<div class="glass-panel w-full max-w-xl p-10 flex flex-col gap-10 rounded-none border-t-2 border-t-primary/30">
<!-- Step 1: Role Selector -->
<section class="space-y-4">
<span class="font-label text-[10px] uppercase tracking-widest text-primary/60 font-bold">01 — Identity Protocol</span>
<div class="grid grid-cols-2 gap-4">
<!-- Teacher Role (Active Example) -->
<button class="flex flex-col items-center justify-center p-6 gap-3 group transition-all duration-300 border border-secondary bg-secondary-container/20 glow-secondary">
<span class="material-symbols-outlined text-4xl text-secondary" style="font-variation-settings: 'FILL' 1;">school</span>
<span class="font-headline text-sm font-bold tracking-tight text-on-secondary-container">I am a Teacher</span>
</button>
<!-- Student Role -->
<button class="flex flex-col items-center justify-center p-6 gap-3 group transition-all duration-300 border border-outline-variant hover:border-primary/50 bg-surface-container-low/40">
<span class="material-symbols-outlined text-4xl text-on-surface-variant group-hover:text-primary transition-colors">history_edu</span>
<span class="font-headline text-sm font-bold tracking-tight text-on-surface-variant group-hover:text-on-surface transition-colors">I am a Student</span>
</button>
</div>
</section>
<!-- Step 2: Input Fields -->
<form class="flex flex-col gap-6">
<div class="space-y-4">
<span class="font-label text-[10px] uppercase tracking-widest text-primary/60 font-bold">02 — Secure Gateway</span>
<div class="space-y-4">
<!-- Role-specific field (Teacher active in this mock) -->
<div class="relative group">
<label class="absolute -top-2 left-3 px-1 bg-surface-container text-[10px] font-bold text-secondary uppercase tracking-tighter z-10">Institution / College</label>
<input class="w-full bg-surface-container-lowest border-outline-variant focus:border-secondary focus:ring-0 text-on-surface font-body p-4 pt-5 placeholder:text-outline/40 transition-all outline-none" placeholder="Global Tech University" type="text"/>
</div>
<div class="relative group">
<label class="absolute -top-2 left-3 px-1 bg-surface-container text-[10px] font-bold text-outline uppercase tracking-tighter z-10 group-focus-within:text-primary">Email Matrix</label>
<input class="w-full bg-surface-container-lowest border-outline-variant focus:border-primary focus:ring-0 text-on-surface font-body p-4 pt-5 placeholder:text-outline/40 transition-all outline-none" placeholder="access@educore.io" type="email"/>
</div>
<div class="relative group">
<label class="absolute -top-2 left-3 px-1 bg-surface-container text-[10px] font-bold text-outline uppercase tracking-tighter z-10 group-focus-within:text-primary">Access Cipher</label>
<input class="w-full bg-surface-container-lowest border-outline-variant focus:border-primary focus:ring-0 text-on-surface font-body p-4 pt-5 placeholder:text-outline/40 transition-all outline-none" placeholder="••••••••••••" type="password"/>
</div>
</div>
</div>
<!-- Action Button -->
<button class="w-full bg-gradient-to-r from-secondary-container to-secondary py-5 font-headline font-bold text-white uppercase tracking-widest hover:brightness-110 active:scale-[0.98] transition-all flex items-center justify-center gap-2 group" type="submit">
                    Initialize Core
                    <span class="material-symbols-outlined text-lg group-hover:translate-x-1 transition-transform">arrow_forward</span>
</button>
</form>
<!-- Step 3: Registration Logic & OAuth -->
<div class="flex flex-col gap-8">
<div class="flex items-center justify-between text-xs font-label uppercase tracking-tighter">
<button class="text-on-surface-variant hover:text-primary transition-colors">Forgot Cipher?</button>
<button class="text-secondary font-bold hover:underline decoration-secondary/30 underline-offset-4">Register New Entity</button>
</div>
<div class="relative flex items-center py-2">
<div class="flex-grow border-t border-outline-variant/30"></div>
<span class="flex-shrink mx-4 font-label text-[10px] text-outline uppercase tracking-[0.3em]">External Auth</span>
<div class="flex-grow border-t border-outline-variant/30"></div>
</div>
<button class="w-full flex items-center justify-center gap-4 bg-surface-container-highest border border-outline-variant/40 py-4 hover:bg-surface-bright transition-colors group">
<img alt="Google" class="w-5 h-5 grayscale group-hover:grayscale-0 transition-all" data-alt="Official Google logo icon in vibrant colors against a white background for OAuth sign-in authentication purposes" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBccBCLhsFq9-YRafDDAh8rw76vSwhXCLAZ4snMylCG9Ni8uxisa1mTTDAt11VG6v6C-W1cTtvGMx3PyWCXnDiuy1WpuLIFPEMTxutn0rjJkJXchpxQyfXBmKgsq78LqaF_TB_qs52RSHgASyIsCqcN5yMw4AYSAgfrbfG_jyPPoYh7vXRw-t5byakd-abMPgYhrr32hsd5X-obx9DR7JRDzx82VaYukvbqpUhbPACWe6ZFEp0zc3yrwYiii4ZOndO33PpD3YoSn3s2"/>
<span class="font-headline font-semibold text-sm tracking-tight text-on-surface">Sign in with Google Node</span>
</button>
</div>
</div>
<!-- Decorative UI Element (HUD Element) -->
<div class="hidden lg:block absolute bottom-10 right-10 p-4 border-l border-b border-primary/20 bg-primary/5">
<div class="flex flex-col gap-1">
<span class="font-label text-[8px] uppercase tracking-widest text-primary/40">Observatory Status</span>
<div class="flex items-center gap-2">
<div class="w-1.5 h-1.5 rounded-full bg-primary animate-pulse"></div>
<span class="font-headline text-[10px] text-primary/80">KINETIC ENGINE NOMINAL</span>
</div>
</div>
</div>
</main>
<!-- Footer Cluster -->
<footer class="fixed bottom-0 w-full z-50">
<div class="flex flex-col md:flex-row justify-between items-center px-8 py-4 w-full">
<span class="font-label text-xs uppercase tracking-widest text-slate-500">
                © 2024 EduCore Kinetic Observatory. All rights reserved.
            </span>
<div class="flex gap-6 mt-4 md:mt-0">
<a class="font-label text-xs uppercase tracking-widest text-slate-500 hover:text-white transition-colors" href="#">Privacy Policy</a>
<a class="font-label text-xs uppercase tracking-widest text-slate-500 hover:text-white transition-colors" href="#">Terms of Service</a>
<a class="font-label text-xs uppercase tracking-widest text-slate-500 hover:text-white transition-colors" href="#">System Status</a>
</div>
</div>
</footer>
</body></html>
